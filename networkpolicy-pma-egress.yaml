apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-pma-to-mysql
  namespace: database
spec:
  podSelector:
    matchLabels:
      app: phpmyadmin
  policyTypes:
    - Egress
  egress:
    - to:
      - podSelector:
          matchLabels:
            app: mysql
      ports:
        - protocol: TCP
          port: 3306