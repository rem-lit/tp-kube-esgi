apiVersion: apps/v1
kind: Deployment
metadata:
  name: phpmyadmin
  namespace: database
spec:
  replicas: 2
  selector:
    matchLabels:
      app: phpmyadmin
  template:
    metadata:
      labels:
        app: phpmyadmin
    spec:
      containers:
        - name: phpmyadmin
          image: phpmyadmin:latest
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: phpmyadmin-configmap
